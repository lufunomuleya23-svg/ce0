<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>
<style>
body{background:#0b0b0f;color:white;font-family:Arial}
.container{max-width:800px;margin:auto;padding:20px}
.card{background:#111;padding:15px;margin-top:10px;border-radius:10px}
button{background:gold;width:100%;padding:10px;border:none;margin-top:10px}
input,select,textarea{width:100%;padding:10px;margin-top:5px}
</style>
</head>

<body>

<div class="container">

<h2>Send Request</h2>

<select id="service">
<option>Web Dev</option>
<option>Consultation</option>
</select>

<input type="date" id="date">
<select id="time">
<option>09:00</option><option>10:00</option>
<option>11:00</option><option>12:00</option>
</select>

<textarea id="message"></textarea>

<button onclick="send()">Send</button>

<h2>My Request</h2>
<div id="box">Loading...</div>

</div>

<script>

const email = localStorage.getItem("userEmail");
const name = localStorage.getItem("userName");

load();

async function send(){

await fetch("/request",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
name,email,
service:service.value,
date:date.value,
time:time.value,
message:message.value
})
});

load();
}

async function load(){

const res = await fetch("/request/"+email);
const d = await res.json();

if(!d){
box.innerHTML="No request";
return;
}

box.innerHTML=`
<div class="card">
${d.service}<br>
${d.message}<br>
Status: ${d.status}<br>
Notes: ${d.adminNotes}<br>

<button onclick="del(${d.id})" style="background:red">
Delete
</button>

</div>
`;
}

async function del(id){
await fetch("/request/"+id,{method:"DELETE"});
load();
}

</script>

</body>
</html>
