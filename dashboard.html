<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0f;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: #000;
    border-bottom: 1px solid gold;
}

.logo {
    color: gold;
    font-weight: bold;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #222;
}

h2 {
    color: gold;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #0b0b0f;
    border: 1px solid #333;
    color: white;
    border-radius: 6px;
}

textarea {
    height: 100px;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    background: gold;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
}

.box {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #222;
    border-radius: 6px;
    background: #0b0b0f;
}
</style>
</head>

<body>

<header>
    <div class="logo">GoldWeb Dashboard</div>
    <a href="#" onclick="logout()" style="color:white;">Logout</a>
</header>

<div class="container">

    <h2 id="welcome"></h2>

    <div class="grid">

        <!-- REQUEST FORM -->
        <div class="card">
            <h2>Send Request</h2>

            <select id="service">
                <option>Web Development</option>
                <option>Consultation</option>
            </select>

            <input type="date" id="date">
            <select id="time">
  <option>09:00</option>
  <option>10:00</option>
  <option>11:00</option>
  <option>12:00</option>
  <option>13:00</option>
  <option>14:00</option>
  <option>15:00</option>
  <option>16:00</option>
  <option>17:00</option>
</select>

            <textarea id="message" placeholder="Your message"></textarea>

            <button onclick="sendRequest()">Send Request</button>

            <p id="status"></p>
        </div>

        <!-- REQUEST DISPLAY -->
        <div class="card">
            <h2>My Request</h2>
            <div id="requestBox">Loading...</div>
        </div>

        <!-- ACCOUNT -->
        <div class="card">
            <h2>Account</h2>

            <div class="box">
                <b id="nameBox"></b><br>
                <span id="emailBox"></span>
            </div>

            <button style="background:red;" onclick="logout()">Logout</button>
        </div>

    </div>
</div>

<script>
const email = localStorage.getItem("userEmail");
const name = localStorage.getItem("userName");

if (!email) {
    window.location.href = "login.html";
}

document.getElementById("welcome").innerText = "Welcome " + name;
document.getElementById("nameBox").innerText = name;
document.getElementById("emailBox").innerText = email;

loadRequest();

/* ================= SEND REQUEST ================= */
async function sendRequest() {

    const res = await fetch("https://ce0-2.onrender.com/request", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            name,
            email,
            service: document.getElementById("service").value,
            date: document.getElementById("date").value,
            time: document.getElementById("time").value,
            message: document.getElementById("message").value
        })
    });

    document.getElementById("status").innerText = await res.text();

    loadRequest();
}

/* ================= LOAD REQUEST ================= */
async function loadRequest() {

    try {
        const res = await fetch(`https://ce0-2.onrender.com/request/${email}`);
        const data = await res.json();

        const box = document.getElementById("requestBox");

        if (!data) {
            box.innerHTML = "No request yet";
            return;
        }

        box.innerHTML = `
            <div class="box">
                <b>${data.service || ""}</b><br>
                📅 ${data.date || ""}<br>
                ⏰ ${data.time || ""}<br>
                📝 ${data.message || ""}
            </div>
        `;

    } catch (err) {
        document.getElementById("requestBox").innerHTML =
            "Failed to load request";
    }
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
