<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0f;
    color: white;
}

.login-box {
    max-width: 350px;
    margin: 120px auto;
    padding: 25px;
    background: #111;
    border: 1px solid gold;
    border-radius: 12px;
    text-align: center;
}

.admin-panel {
    display: none;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid gold;
    padding-bottom: 10px;
}

.topbar h1 {
    color: gold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 15px;
}

.item {
    font-size: 14px;
    padding: 10px;
    border: 1px solid #222;
    margin-bottom: 10px;
    border-radius: 8px;
}

input {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
    margin-bottom: 5px;
    background: #0b0b0f;
    color: white;
    border: 1px solid #333;
    border-radius: 5px;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">
    <h2 style="color:gold;">Admin Login</h2>

    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="loginAdmin()">Login</button>
</div>

<div class="admin-panel" id="adminPanel">

    <div class="topbar">
        <h1>Admin Dashboard</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="grid">

        <div class="card">
            <h3>Users</h3>
            <div id="users"></div>
        </div>

        <div class="card">
            <h3>Bookings</h3>
            <div id="bookings"></div>
        </div>

        <div class="card">
            <h3>Messages</h3>
            <div id="messages"></div>
        </div>

    </div>
</div>

<script>

let token = localStorage.getItem("adminToken");

// AUTO LOGIN
window.onload = function () {
    if (token) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadData();
    }
};

// LOGIN
async function loginAdmin() {
    const res = await fetch("https://ce0-2.onrender.com/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message || "Login failed");
        return;
    }

    token = data.token;
    localStorage.setItem("adminToken", token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";

    loadData();
}

// LOAD ALL
function loadData() {
    loadUsers();
    loadBookings();
    loadMessages();
}

// USERS
async function loadUsers() {
    const res = await fetch("https://ce0-2.onrender.com/admin/users", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("users").innerHTML =
        (data || []).map(u => `
            <div class="item">
                <b>${u.name || "N/A"}</b><br>
                ${u.email || "N/A"}
            </div>
        `).join("");
}

// BOOKINGS
async function loadBookings() {
    const res = await fetch("https://ce0-2.onrender.com/admin/bookings", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("bookings").innerHTML =
        (data || []).map(b => `
            <div class="item">
                <b>${b.service || "N/A"}</b><br>
                ${b.email || "N/A"}<br>

                📅 ${b.bookingDate || "N/A"}  
                ⏰ ${b.bookingTime || "N/A"}<br>

                Status:
                <input id="status-${b.id}" value="${b.status || 'pending'}">

                Notes:
                <input id="notes-${b.id}" value="${b.adminNotes || ''}">

                <button onclick="updateBooking(${b.id})">
                    Update
                </button>
            </div>
        `).join("");
}

// UPDATE BOOKING
async function updateBooking(id) {

    const status = document.getElementById(`status-${id}`).value;
    const adminNotes = document.getElementById(`notes-${id}`).value;

    await fetch("https://ce0-2.onrender.com/admin/update-booking", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({
            id,
            status,
            adminNotes
        })
    });

    loadBookings(); // refresh UI
}

// MESSAGES
async function loadMessages() {
    const res = await fetch("https://ce0-2.onrender.com/admin/messages", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("messages").innerHTML =
        (data || []).map(m => `
            <div class="item">
                <b>${m.name || "N/A"}</b><br>
                ${m.message || ""}
            </div>
        `).join("");
}

// LOGOUT
function logout() {
    localStorage.removeItem("adminToken");
    location.reload();
}

</script>

</body>
</html>
