<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0f;
    color: white;
}

/* LOGIN */
.login-box {
    max-width: 350px;
    margin: 120px auto;
    padding: 25px;
    background: #111;
    border: 1px solid gold;
    border-radius: 12px;
    text-align: center;
}

/* DASHBOARD */
.admin-panel {
    display: none;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid gold;
    padding-bottom: 10px;
}

.topbar h1 {
    color: gold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 20px;
}

/* CARDS */
.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 15px;
}

.card h3 {
    color: gold;
    margin-bottom: 10px;
}

.item {
    font-size: 14px;
    padding: 10px;
    border: 1px solid #222;
    margin-bottom: 10px;
    border-radius: 8px;
}

/* FORM ELEMENTS */
select, textarea {
    width: 100%;
    margin-top: 8px;
    padding: 8px;
    background: #000;
    color: white;
    border: 1px solid #333;
    border-radius: 6px;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
}

button:hover {
    background: #d4af37;
}

small {
    color: #aaa;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

    <h2 style="color:gold;">Admin Login</h2>

    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="loginAdmin()">Login</button>

</div>

<!-- DASHBOARD -->
<div class="admin-panel" id="adminPanel">

    <div class="topbar">
        <h1>Admin Dashboard</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="grid">

        <div class="card">
            <h3>Users</h3>
            <div id="users"></div>
        </div>

        <div class="card">
            <h3>Bookings (CRM)</h3>
            <div id="bookings"></div>
        </div>

        <div class="card">
            <h3>Messages</h3>
            <div id="messages"></div>
        </div>

    </div>

</div>

<script>

let token = localStorage.getItem("adminToken");

// =========================
// AUTO LOGIN CHECK
// =========================
if (token) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadData();
} else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("adminPanel").style.display = "none";
}

// =========================
// LOGIN
// =========================
async function loginAdmin() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:3000/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    if (!res.ok) {
        alert("Invalid login");
        return;
    }

    const data = await res.json();

    token = data.token;
    localStorage.setItem("adminToken", token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";

    loadData();
}

// =========================
// LOAD ALL DATA
// =========================
function loadData() {
    loadUsers();
    loadBookings();
    loadMessages();
}

// =========================
// USERS
// =========================
async function loadUsers() {

    const res = await fetch("http://localhost:3000/admin/users", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("users").innerHTML =
        data.map(u => `
            <div class="item">
                ${u.name}<br>
                ${u.email}
            </div>
        `).join("");
}

// =========================
// BOOKINGS (CRM SYSTEM)
// =========================
async function loadBookings() {

    const res = await fetch("http://localhost:3000/admin/bookings", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("bookings").innerHTML =
        data.map(b => `
            <div class="item">

                <b>${b.service}</b><br>
                ${b.email}<br>
                ${b.bookingDate} ${b.bookingTime || ""}

                <hr style="border:0;border-top:1px solid #333;margin:10px 0;">

                <label>Status:</label>
                <select id="status-${b.id}">
                    <option ${b.status === "pending" ? "selected" : ""}>pending</option>
                    <option ${b.status === "in-progress" ? "selected" : ""}>in-progress</option>
                    <option ${b.status === "done" ? "selected" : ""}>done</option>
                    <option ${b.status === "paid" ? "selected" : ""}>paid</option>
                </select>

                <label>Admin Notes:</label>
                <textarea id="note-${b.id}">${b.adminNotes || ""}</textarea>

                <button onclick="updateBooking(${b.id})">
                    Update Work
                </button>

                <small>Status: ${b.status || "pending"}</small>

            </div>
        `).join("");
}

// =========================
// UPDATE BOOKING
// =========================
async function updateBooking(id) {

    const status = document.getElementById("status-" + id).value;
    const adminNotes = document.getElementById("note-" + id).value;

    const res = await fetch("http://localhost:3000/admin/update-booking", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({
            id,
            status,
            adminNotes
        })
    });

    if (res.ok) {
        alert("Updated successfully");
        loadBookings();
    } else {
        alert("Update failed");
    }
}

// =========================
// MESSAGES
// =========================
async function loadMessages() {

    const res = await fetch("http://localhost:3000/admin/messages", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("messages").innerHTML =
        data.map(m => `
            <div class="item">
                <b>${m.name}</b><br>
                ${m.email}<br>
                ${m.message}
            </div>
        `).join("");
}

// =========================
// LOGOUT
// =========================
function logout() {
    localStorage.removeItem("adminToken");
    location.reload();
}

</script>

</body>
</html>
