<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0f;
    color: white;
}

.login-box {
    max-width: 350px;
    margin: 120px auto;
    padding: 20px;
    background: #111;
    border: 1px solid gold;
    border-radius: 10px;
    text-align: center;
}

.admin-panel {
    display: none;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

.topbar {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid gold;
    padding-bottom: 10px;
}

.topbar h1 {
    color: gold;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #222;
}

.item {
    padding: 10px;
    border: 1px solid #222;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
    background: #0b0b0f;
    border: 1px solid #333;
    color: white;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
    background: gold;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
    <h2 style="color:gold;">Admin Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="admin-panel" id="adminPanel">

    <div class="topbar">
        <h1>Admin Dashboard</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="grid">

        <div class="card">
            <h3>Users</h3>
            <div id="users"></div>
        </div>

        <div class="card">
            <h3>Requests</h3>
            <div id="requests"></div>
        </div>

        <div class="card">
            <h3>Messages</h3>
            <div id="messages"></div>
        </div>

    </div>
</div>

<script>

let token = localStorage.getItem("adminToken");

/* ================= AUTO LOGIN ================= */
window.onload = function () {
    if (token) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadAll();
    }
};

/* ================= LOGIN ================= */
async function login() {

    const res = await fetch("https://ce0-2.onrender.com/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (!res.ok) {
        alert("Login failed");
        return;
    }

    token = data.token;
    localStorage.setItem("adminToken", token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";

    loadAll();
}

/* ================= LOAD ALL ================= */
function loadAll() {
    loadUsers();
    loadRequests();
    loadMessages();
}

/* ================= USERS ================= */
async function loadUsers() {

    const res = await fetch("https://ce0-2.onrender.com/admin/users", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("users").innerHTML =
        (data || []).map(u => `
            <div class="item">
                <b>${u.name}</b><br>
                ${u.email}
            </div>
        `).join("");
}

/* ================= REQUESTS ================= */
async function loadRequests() {

    const res = await fetch("https://ce0-2.onrender.com/admin/requests", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("requests").innerHTML =
        (data || []).map(r => `
            <div class="item">
                <b>${r.service}</b><br>
                ${r.name}<br>
                ${r.email}<br>
                📅 ${r.date}<br>
                ⏰ ${r.time}<br>
                📝 ${r.message}
            </div>
        `).join("");
}

/* ================= MESSAGES ================= */
async function loadMessages() {

    const res = await fetch("https://ce0-2.onrender.com/admin/messages", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    document.getElementById("messages").innerHTML =
        (data || []).map(m => `
            <div class="item">
                <b>${m.name}</b><br>
                ${m.email}<br>
                ${m.message}
            </div>
        `).join("");
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.removeItem("adminToken");
    location.reload();
}

</script>

</body>
</html>
