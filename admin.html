<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body { background:#0b0b0f; color:white; font-family:Arial; }
.login-box, .admin-panel { max-width:1000px; margin:auto; padding:20px; }
.login-box { margin-top:120px; }
.card { background:#111; padding:15px; margin-top:10px; border-radius:10px; }
input, button { width:100%; padding:8px; margin-top:5px; }
button { background:gold; border:none; cursor:pointer; }
</style>
</head>

<body>

<div class="login-box" id="loginBox">
<h2>Admin Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="admin-panel" id="adminPanel" style="display:none">

<h2>Admin Dashboard</h2>
<button onclick="logout()">Logout</button>

<h3>Requests</h3>
<div id="requests"></div>

<h3>Users</h3>
<div id="users"></div>

</div>

<script>

let token = localStorage.getItem("adminToken");

if (token) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadAll();
}

async function login() {

const res = await fetch("/admin/login", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
username:username.value,
password:password.value
})
});

const data = await res.json();
token = data.token;
localStorage.setItem("adminToken", token);

document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";

loadAll();
}

function loadAll(){
loadRequests();
loadUsers();
}

async function loadRequests(){
const res = await fetch("/admin/requests");
const data = await res.json();

document.getElementById("requests").innerHTML =
data.map(r => `
<div class="card">
<b>${r.name}</b><br>
${r.service}<br>
${r.message}<br>

Status:
<input id="s${r.id}" value="${r.status}">

Notes:
<input id="n${r.id}" value="${r.adminNotes}">

<button onclick="update(${r.id})">Update</button>
<button onclick="del(${r.id})" style="background:red">Delete</button>
</div>
`).join("");
}

async function update(id){

await fetch("/admin/update-request", {
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({
id,
status:document.getElementById("s"+id).value,
adminNotes:document.getElementById("n"+id).value
})
});

loadRequests();
}

async function del(id){
await fetch("/admin/delete-request/"+id,{method:"DELETE"});
loadRequests();
}

async function loadUsers(){
const res = await fetch("/admin/users");
const data = await res.json();

document.getElementById("users").innerHTML =
data.map(u=>`
<div class="card">
${u.name}<br>
${u.email}
</div>
`).join("");
}

function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
